<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L96A1 Elite: Morning Shift</title>
    <style>
        :root { --accent: #ff3e3e; --glass: rgba(255, 255, 255, 0.2); }
        body { margin: 0; overflow: hidden; background: #87ceeb; font-family: 'Segoe UI', sans-serif; touch-action: none; user-select: none; }
        
        /* High-End HUD */
        #ui-layer { position: fixed; inset: 0; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 25px; }
        .stats { display: flex; gap: 15px; }
        .badge { background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 8px; color: white; font-weight: 900; border-left: 4px solid var(--accent); backdrop-filter: blur(5px); }
        
        /* Sniper Reticle */
        #reticle { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; }
        .cross { position: absolute; background: rgba(0,0,0,0.8); }
        .c-v { width: 1.5px; height: 50px; } .c-h { width: 50px; height: 1.5px; }
        .center-dot { width: 4px; height: 4px; background: red; border-radius: 50%; box-shadow: 0 0 10px red; }

        /* Controls */
        #move-zone { position: absolute; bottom: 50px; left: 50px; width: 140px; height: 140px; border: 2px solid var(--glass); border-radius: 50%; background: var(--glass); pointer-events: auto; }
        #stick { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: white; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        #fire-btn { position: absolute; bottom: 60px; right: 60px; width: 100px; height: 100px; background: var(--accent); border: 5px solid white; border-radius: 50%; pointer-events: auto; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(255, 62, 62, 0.4); cursor: pointer; transition: transform 0.1s; }
        #fire-btn:active { transform: scale(0.9); }

        /* Overlays */
        #loading { position: fixed; inset: 0; background: #111; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        #start-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 90; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; cursor: pointer; text-align: center; }
        .spinner { border: 5px solid rgba(255,255,255,0.1); border-top: 5px solid white; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <p>SYNCING SYSTEMS, NGA...</p>
</div>

<div id="start-screen">
    <h1 style="font-size: 3rem; margin-bottom: 0;">L96A1 ELITE</h1>
    <p style="letter-spacing: 5px; opacity: 0.6;">MORNING OPERATION</p>
    <p style="margin-top: 50px; border: 1px solid white; padding: 10px 30px;">TAP TO DEPLOY</p>
</div>

<div id="ui-layer">
    <div class="stats">
        <div class="badge">TARGETS: <span id="target-count">12</span></div>
        <div class="badge" id="fps-val">60 FPS</div>
    </div>
    <div id="reticle">
        <div class="cross c-v"></div>
        <div class="cross c-h"></div>
        <div class="center-dot"></div>
    </div>
</div>

<div id="move-zone"><div id="stick"></div></div>
<div id="fire-btn">
    <svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
    </svg>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    class GameEngine {
        constructor() {
            this.initCore();
            this.initLights();
            this.initEnvironment();
            this.initParticles();
            this.loadSniper();
            this.setupEvents();
            this.renderLoop();
        }

        initCore() {
            this.scene = new THREE.Scene();
            this.scene.background = new THREE.Color(0x87ceeb);
            this.scene.fog = new THREE.FogExp2(0x87ceeb, 0.01);

            this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            this.camera.position.set(0, 1.6, 0);
            this.scene.add(this.camera);

            this.renderer = new THREE.WebGLRenderer({ antialias: true });
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            this.renderer.shadowMap.enabled = true;
            this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.body.appendChild(this.renderer.domElement);

            this.clock = new THREE.Clock();
            this.raycaster = new THREE.Raycaster();
            this.targets = [];
            this.moveData = { x: 0, y: 0 };
            this.lookData = { x: 0, y: 0 };
            this.recoil = new THREE.Vector3();
        }

        initLights() {
            // Warm Morning Sun
            const sun = new THREE.DirectionalLight(0xfff5d7, 2.5);
            sun.position.set(50, 100, 50);
            sun.castShadow = true;
            this.scene.add(sun);

            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            this.scene.add(ambient);
            
            // Sun Mesh for visuals
            const sunGeo = new THREE.SphereGeometry(5, 32, 32);
            const sunMat = new THREE.MeshBasicMaterial({ color: 0xffffee });
            const sunMesh = new THREE.Mesh(sunGeo, sunMat);
            sunMesh.position.set(100, 200, -300);
            this.scene.add(sunMesh);
        }

        initEnvironment() {
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(500, 500),
                new THREE.MeshStandardMaterial({ color: 0x3d5e3a, roughness: 0.8 })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            this.scene.add(ground);

            for (let i = 0; i < 12; i++) this.spawnTarget();
        }

        spawnTarget() {
            const target = new THREE.Mesh(
                new THREE.CapsuleGeometry(0.4, 1.2),
                new THREE.MeshStandardMaterial({ color: 0xff3333, emissive: 0x550000 })
            );
            target.position.set(Math.random() * 60 - 30, 1.1, Math.random() * -60 - 10);
            target.castShadow = true;
            target.userData = { hp: 100 };
            this.scene.add(target);
            this.targets.push(target);
        }

        initParticles() {
            this.bloodBits = [];
            this.bloodGeo = new THREE.SphereGeometry(0.06, 4, 4);
            this.bloodMat = new THREE.MeshBasicMaterial({ color: 0xaa0000 });
        }

        loadSniper() {
            const loader = new GLTFLoader();
            
            // Failsafe: Start game even if gun fails after 4s
            const failTimer = setTimeout(() => {
                console.warn("Gun load timed out.");
                this.showStart();
            }, 4000);

            loader.load('sniper.glb', (gltf) => {
                clearTimeout(failTimer);
                this.sniper = gltf.scene;
                this.camera.add(this.sniper);
                this.sniper.position.set(0.4, -0.45, -0.7);
                this.sniper.rotation.y = Math.PI;
                this.sniper.scale.set(0.12, 0.12, 0.12);

                this.mixer = new THREE.AnimationMixer(this.sniper);
                if (gltf.animations.length > 0) this.fireAnim = gltf.animations[0];
                
                this.showStart();
            }, undefined, (e) => {
                clearTimeout(failTimer);
                console.error("Path Error:", e);
                this.showStart();
            });
        }

        showStart() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('start-screen').style.display = 'flex';
        }

        setupEvents() {
            const stick = document.getElementById('stick');
            const zone = document.getElementById('move-zone');

            zone.addEventListener('touchmove', (e) => {
                const t = e.touches[0];
                const r = zone.getBoundingClientRect();
                const dx = t.clientX - (r.left + 70), dy = t.clientY - (r.top + 70);
                const d = Math.min(Math.sqrt(dx*dx + dy*dy), 70);
                const a = Math.atan2(dy, dx);
                this.moveData = { x: (Math.cos(a)*d)/70, y: (Math.sin(a)*d)/70 };
                stick.style.left = `calc(50% + ${Math.cos(a)*d}px)`;
                stick.style.top = `calc(50% + ${Math.sin(a)*d}px)`;
            });

            zone.addEventListener('touchend', () => {
                this.moveData = { x: 0, y: 0 };
                stick.style.left = stick.style.top = '50%';
            });

            window.addEventListener('touchmove', (e) => {
                const t = e.touches[0];
                if (t.clientX > window.innerWidth / 2) {
                    if (this.lookData.x !== 0) {
                        this.camera.rotation.y -= (t.clientX - this.lookData.x) * 0.005;
                        this.camera.rotation.x -= (t.clientY - this.lookData.y) * 0.005;
                        this.camera.rotation.x = Math.max(-1.4, Math.min(1.4, this.camera.rotation.x));
                    }
                    this.lookData = { x: t.clientX, y: t.clientY };
                }
            });
            window.addEventListener('touchend', () => this.lookData = { x: 0, y: 0 });

            document.getElementById('fire-btn').addEventListener('touchstart', (e) => {
                e.preventDefault();
                this.fire();
            });
        }

        fire() {
            if (this.mixer && this.fireAnim) {
                this.mixer.stopAllAction();
                this.mixer.clipAction(this.fireAnim).setLoop(THREE.LoopOnce).play();
            }

            // Cinematic Shake Logic: Recoil Vector
            this.recoil.set(
                (Math.random() - 0.5) * 0.1, 
                0.12 + Math.random() * 0.05, 
                0
            );

            this.raycaster.setFromCamera({ x: 0, y: 0 }, this.camera);
            const hits = this.raycaster.intersectObjects(this.targets);

            if (hits.length > 0) {
                const t = hits[0].object;
                this.spawnBlood(hits[0].point);
                this.scene.remove(t);
                this.targets = this.targets.filter(x => x !== t);
                document.getElementById('target-count').innerText = this.targets.length;
            }
        }

        spawnBlood(pos) {
            for (let i = 0; i < 10; i++) {
                const p = new THREE.Mesh(this.bloodGeo, this.bloodMat);
                p.position.copy(pos);
                p.userData.v = new THREE.Vector3(Math.random()-0.5, Math.random()*0.5, Math.random()-0.5).multiplyScalar(0.2);
                this.scene.add(p);
                this.bloodBits.push(p);
                setTimeout(() => { this.scene.remove(p); this.bloodBits = this.bloodBits.filter(b => b !== p); }, 800);
            }
        }

        renderLoop() {
            requestAnimationFrame(() => this.renderLoop());
            const dt = this.clock.getDelta();

            // Movement Physics
            this.camera.translateZ(this.moveData.y * 0.18);
            this.camera.translateX(this.moveData.x * 0.18);
            this.camera.position.y = 1.6;

            // Recoil Recovery Math
            // Recoil decay: $v_{new} = v_{old} \times 0.85$
            this.camera.rotation.x += this.recoil.y;
            this.camera.rotation.y += this.recoil.x;
            this.recoil.multiplyScalar(0.85);

            // Blood Physics
            this.bloodBits.forEach(b => b.position.add(b.userData.v));

            if (this.mixer) this.mixer.update(dt);
            this.renderer.render(this.scene, this.camera);
            
            if (this.clock.elapsedTime % 1 < 0.02) {
                document.getElementById('fps-val').innerText = Math.round(1/dt) + " FPS";
            }
        }
    }

    document.getElementById('start-screen').onclick = () => {
        document.getElementById('start-screen').remove();
        new GameEngine();
    };

    window.addEventListener('resize', () => {
        // Redraw on rotate
    });
</script>
</body>
</html>
