<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L96A1 Morning - Nga Edition</title>
    <style>
        :root { --main-color: #ffffff; --accent-color: #ffde59; }
        body { margin: 0; overflow: hidden; background: #87ceeb; font-family: 'Inter', sans-serif; touch-action: none; }
        
        #hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 25px; color: #333; }
        .stat-card { background: rgba(255,255,255,0.8); border-bottom: 4px solid var(--accent-color); padding: 12px 20px; font-weight: 800; border-radius: 8px; backdrop-filter: blur(5px); }
        
        #reticle { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; }
        .scope-line { position: absolute; background: #000; opacity: 0.5; }
        .sl-v { width: 1px; height: 40px; } .sl-h { width: 40px; height: 1px; }
        .center-dot { width: 4px; height: 4px; background: red; border-radius: 50%; }

        #joy-zone { position: absolute; bottom: 50px; left: 50px; width: 130px; height: 130px; border: 3px solid rgba(0,0,0,0.1); border-radius: 50%; pointer-events: auto; background: rgba(255,255,255,0.3); }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: #333; border-radius: 50%; transform: translate(-50%, -50%); }
        
        #fire-zone { position: absolute; bottom: 60px; right: 60px; pointer-events: auto; }
        .fire-btn { width: 90px; height: 90px; background: #ff4747; border: 5px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0,0,0,0.2); cursor: pointer; }

        #overlay { position: fixed; inset: 0; background: #fff; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #333; cursor: pointer; }
    </style>
</head>
<body>

<div id="overlay">
    <h1>READY FOR THE MORNING SHIFT?</h1>
    <p>TAP TO START</p>
</div>

<div id="hud">
    <div style="display: flex; justify-content: space-between;">
        <div class="stat-card">TARGETS: <span id="npc-count">10</span></div>
    </div>
    <div id="reticle">
        <div class="scope-line sl-v"></div>
        <div class="scope-line sl-h"></div>
        <div class="center-dot"></div>
    </div>
</div>

<div id="joy-zone"><div id="joy-stick"></div></div>
<div id="fire-zone"><div class="fire-btn">🔥</div></div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    class SniperGame {
        constructor() {
            this.init();
            this.createWorld();
            this.loadGun();
            this.setupControls();
            this.animate();
        }

        init() {
            this.scene = new THREE.Scene();
            this.scene.background = new THREE.Color(0x87ceeb); // Morning Sky
            this.scene.fog = new THREE.Fog(0x87ceeb, 20, 100);

            this.camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            this.camera.position.set(0, 1.6, 0);
            this.scene.add(this.camera); // Add camera to scene immediately

            this.renderer = new THREE.WebGLRenderer({ antialias: true });
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(this.renderer.domElement);

            this.clock = new THREE.Clock();
            this.raycaster = new THREE.Raycaster();
            this.npcs = [];
            this.moveDir = { x: 0, y: 0 };
            this.lastLook = { x: 0, y: 0 };
        }

        createWorld() {
            // Sun Light
            const sun = new THREE.DirectionalLight(0xfff5d7, 2);
            sun.position.set(10, 20, 10);
            this.scene.add(sun);
            this.scene.add(new THREE.AmbientLight(0xffffff, 0.8));

            // Floor
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(200, 200),
                new THREE.MeshStandardMaterial({ color: 0x4a7c44 }) // Grass Green
            );
            ground.rotation.x = -Math.PI / 2;
            this.scene.add(ground);

            for (let i = 0; i < 10; i++) this.spawnNPC();
        }

        loadGun() {
            const loader = new GLTFLoader();
            // Using ./ to ensure it looks in the root folder
            loader.load('./sniper.glb', (gltf) => {
                this.sniper = gltf.scene;
                this.camera.add(this.sniper);
                
                this.sniper.position.set(0.35, -0.35, -0.6);
                this.sniper.rotation.y = Math.PI;
                this.sniper.scale.set(0.1, 0.1, 0.1);

                this.mixer = new THREE.AnimationMixer(this.sniper);
                this.shootAnim = gltf.animations[0];
                console.log("Sniper loaded successfully");
            }, undefined, (err) => {
                console.error("FAILED TO LOAD SNIPER.GLB:", err);
                alert("Can't find sniper.glb! Check your file name (all lowercase).");
            });
        }

        spawnNPC() {
            const body = new THREE.Mesh(
                new THREE.CapsuleGeometry(0.4, 1.2),
                new THREE.MeshStandardMaterial({ color: 0xff4444 })
            );
            body.position.set(Math.random() * 50 - 25, 1.1, Math.random() * -50 - 10);
            body.userData = { hp: 100 };
            this.scene.add(body);
            this.npcs.push(body);
        }

        setupControls() {
            const stick = document.getElementById('joy-stick');
            const zone = document.getElementById('joy-zone');

            zone.addEventListener('touchmove', (e) => {
                const t = e.touches[0];
                const r = zone.getBoundingClientRect();
                const dx = t.clientX - (r.left + 65), dy = t.clientY - (r.top + 65);
                const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 65);
                const angle = Math.atan2(dy, dx);
                
                this.moveDir.x = (Math.cos(angle) * dist) / 65;
                this.moveDir.y = (Math.sin(angle) * dist) / 65;
                stick.style.left = `calc(50% + ${Math.cos(angle) * dist}px)`;
                stick.style.top = `calc(50% + ${Math.sin(angle) * dist}px)`;
            });

            zone.addEventListener('touchend', () => {
                this.moveDir = { x: 0, y: 0 };
                stick.style.left = stick.style.top = '50%';
            });

            window.addEventListener('touchmove', (e) => {
                const t = e.touches[0];
                if (t.clientX > window.innerWidth / 2) {
                    if (this.lastLook.x !== 0) {
                        this.camera.rotation.y -= (t.clientX - this.lastLook.x) * 0.005;
                        this.camera.rotation.x -= (t.clientY - this.lastLook.y) * 0.005;
                    }
                    this.lastLook.x = t.clientX; this.lastLook.y = t.clientY;
                }
            });
            window.addEventListener('touchend', () => { this.lastLook = { x: 0, y: 0 }; });

            document.querySelector('.fire-btn').addEventListener('touchstart', (e) => {
                e.preventDefault();
                this.fire();
            });
        }

        fire() {
            if (this.mixer && this.shootAnim) {
                this.mixer.stopAllAction();
                this.mixer.clipAction(this.shootAnim).setLoop(THREE.LoopOnce).play();
            }

            this.raycaster.setFromCamera({ x: 0, y: 0 }, this.camera);
            const hits = this.raycaster.intersectObjects(this.npcs);

            if (hits.length > 0) {
                const target = hits[0].object;
                this.scene.remove(target);
                this.npcs = this.npcs.filter(n => n !== target);
                document.getElementById('npc-count').innerText = this.npcs.length;
            }
        }

        animate() {
            requestAnimationFrame(() => this.animate());
            const dt = this.clock.getDelta();
            this.camera.translateZ(this.moveDir.y * 0.15);
            this.camera.translateX(this.moveDir.x * 0.15);
            this.camera.position.y = 1.6;
            if (this.mixer) this.mixer.update(dt);
            this.renderer.render(this.scene, this.camera);
        }
    }

    document.getElementById('overlay').onclick = () => {
        document.getElementById('overlay').remove();
        new SniperGame();
    };
</script>
</body>
</html>
